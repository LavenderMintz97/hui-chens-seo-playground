<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
<title id="title">Founders Club Wellness HIIT weekly event poster</title>
<desc id="desc">Promotional poster for Founders Club Wellness HIIT with community, fitness, health measurement and protein serve highlights.</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fff7f1"/><stop offset=".48" stop-color="#f0e7ff"/><stop offset="1" stop-color="#e3fff6"/></linearGradient><linearGradient id="orange" x1="0" x2="1"><stop offset="0" stop-color="#ff6a00"/><stop offset="1" stop-color="#ff9f58"/></linearGradient><linearGradient id="purple" x1="0" x2="1"><stop offset="0" stop-color="#5b21b6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#4f2d70" flood-opacity=".18"/></filter></defs>
<rect width="900" height="1200" fill="url(#bg)"/>
<circle cx="70" cy="80" r="18" fill="#7c3aed" opacity=".9"/><circle cx="110" cy="55" r="12" fill="#ff7a1a"/><circle cx="820" cy="110" r="15" fill="#7c3aed"/><circle cx="780" cy="70" r="9" fill="#ff7a1a"/>
