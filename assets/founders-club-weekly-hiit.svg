<g transform="translate(70 350)"><text x="0" y="0" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#111827">Connect</text><text x="332" y="0" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="url(#orange)">Move</text><text x="565" y="0" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="url(#purple)">Grow</text><path d="M5 24 C190 70 360 66 520 26 S760 -8 825 40" fill="none" stroke="#ff6a00" stroke-width="10" stroke-linecap="round" opacity=".55"/></g>
<g transform="translate(65 430)" filter="url(#shadow)"><rect width="360" height="175" rx="24" fill="#fff"/><circle cx="72" cy="72" r="42" fill="#6d28d9"/><text x="136" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#5b21b6">HEALTH</text><text x="136" y="95" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#111827">MEASUREMENT</text><text x="35" y="135" font-family="Arial, sans-serif" font-size="22" fill="#253044">Muscle Mass  |  Weight  |  BMI</text></g>
<g transform="translate(475 430)" filter="url(#shadow)"><rect width="360" height="175" rx="24" fill="#fff"/><circle cx="72" cy="72" r="42" fill="#ff6a00"/><text x="136" y="58" font-family="Arial, sans-serif" font-size="27" font-weight="900" fill="#ff6a00">WELLNESS</text><text x="136" y="95" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#111827">CONSULTANT</text><text x="35" y="135" font-family="Arial, sans-serif" font-size="22" fill="#253044">Tips  |  Nutrition  |  Feedback</text></g>
<g transform="translate(65 650)" filter="url(#shadow)"><rect width="770" height="265" rx="28" fill="#111827"/><text x="40" y="68" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#ffd84d">Why Join Us?</text><text x="42" y="118" font-family="Arial, sans-serif" font-size="25" fill="#fff">- Weekly community event</text><text x="42" y="158" font-family="Arial, sans-serif" font-size="25" fill="#fff">- All fitness levels welcome</text><text x="42" y="198" font-family="Arial, sans-serif" font-size="25" fill="#fff">- Improve strength and endurance</text><text x="42" y="238" font-family="Arial, sans-serif" font-size="25" fill="#fff">- Build healthy habits and new friends</text></g>
<g transform="translate(65 955)" filter="url(#shadow)"><rect width="770" height="120" rx="24" fill="url(#purple)"/><text x="42" y="50" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#fff">BRING YOUR BELONGINGS</text><text x="42" y="92" font-family="Arial, sans-serif" font-size="25" fill="#fff">Water bottle  |  Towel  |  Extra shoes  |  Gym bag</text></g>
<text x="450" y="1145" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#ff6a00">Prepare, Hydrate, and Let's Have Fun!</text>
